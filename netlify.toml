[build]
  # Directory to publish (the public/ folder is served by Netlify)
  publish = "public"

  # No build command needed for a static site
  command = ""

[build.environment]
  NODE_VERSION = "18"

# Redirect all requests to index.html so the login page is the entry point
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

# API calls are proxied to the Laravel backend.
# Replace the `to` URL with your actual Laravel backend URL, or set it via
# Netlify's Edge Functions / environment substitution if your plan supports it.
[[redirects]]
  from   = "/api/*"
  to     = "https://your-laravel-backend.example.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/login"
  to     = "https://your-laravel-backend.example.com/login"
  status = 200
  force  = true

[[redirects]]
  from   = "/dashboard"
  to     = "https://your-laravel-backend.example.com/dashboard"
  status = 200
  force  = true

# SPA fallback – any unmatched path serves index.html with a 200 so the
# client-side app can handle routing.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
