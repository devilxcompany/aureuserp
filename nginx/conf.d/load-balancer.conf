# ============================================================
# Nginx Load Balancer Configuration
# Used with docker-compose.scale.yml when running multiple app instances
# ============================================================

upstream php_fpm {
    # Load balancing strategy: least_conn distributes to least busy server
    least_conn;
    server aureus_app_1:9000 weight=1 max_fails=3 fail_timeout=30s;
    server aureus_app_2:9000 weight=1 max_fails=3 fail_timeout=30s;
    server aureus_app_3:9000 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
}
