# ============================================================
# AureusERP - Prometheus Monitoring Configuration
# ============================================================
# docker compose --profile monitoring up -d
# ============================================================

version: '3.9'

networks:
  aureus_network:
    name: aureuserp_aureus_network

volumes:
  prometheus_data:
  grafana_data:

services:
  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aureus_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - aureus_network

  # ── Grafana Dashboard ────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: aureus_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-CHANGE_THIS}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_URL:-http://localhost:3000}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - aureus_network

  # ── Node Exporter (Host metrics) ─────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: aureus_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - aureus_network

  # ── MySQL Exporter ────────────────────────────────────────
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: aureus_mysql_exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    environment:
      DATA_SOURCE_NAME: "${DB_USERNAME:-aureus}:${DB_PASSWORD}@(db:3306)/${DB_DATABASE:-aureuserp}"
    networks:
      - aureus_network

  # ── Redis Exporter ────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: aureus_redis_exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    networks:
      - aureus_network
