version: '3.9'

# ============================================================
# AureusERP Docker Compose - Full Stack
# ============================================================

networks:
  aureus_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local
  nginx_logs:
    driver: local

services:
  # ──────────────────────────────────────────
  # PHP-FPM Application
  # ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/${GITHUB_REPOSITORY:-devilxcompany/aureuserp}:${IMAGE_TAG:?IMAGE_TAG must be set in .env}
    container_name: aureus_app
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-AureusERP}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-aureuserp}
      DB_USERNAME: ${DB_USERNAME:-aureus}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@aureuserp.com}
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aureus_network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────────
  # Nginx Web Server
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: aureus_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app/public:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - aureus_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: aureus_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-aureuserp}
      MYSQL_USER: ${DB_USERNAME:-aureus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dbpassword}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    networks:
      - aureus_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Redis Cache & Sessions
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aureus_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    networks:
      - aureus_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Queue Worker
  # ──────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: aureus_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-aureuserp}
      DB_USERNAME: ${DB_USERNAME:-aureus}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - db
      - redis
    networks:
      - aureus_network

  # ──────────────────────────────────────────
  # Laravel Scheduler
  # ──────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: aureus_scheduler
    restart: unless-stopped
    command: ["/bin/bash", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-aureuserp}
      DB_USERNAME: ${DB_USERNAME:-aureus}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - app
      - db
      - redis
    networks:
      - aureus_network

  # ──────────────────────────────────────────
  # MailHog (Development email testing)
  # ──────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: aureus_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_HTTP_PORT:-8025}:8025"
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
    networks:
      - aureus_network
    profiles:
      - development

  # ──────────────────────────────────────────
  # phpMyAdmin (Optional database GUI)
  # ──────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: aureus_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    ports:
      - "${PMA_PORT:-8080}:80"
    depends_on:
      - db
    networks:
      - aureus_network
    profiles:
      - tools
